name: speto
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.10.0
  google_fonts: ^6.3.2
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # State management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0

  # Storage & caching
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  http: ^1.4.0
  speto_shared:
    path: packages/speto_shared

  # Utils
  url_launcher: ^6.3.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/catalog.json
    - assets/lottie/
    - assets/i18n/
