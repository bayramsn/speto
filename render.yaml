services:
  - type: web
    runtime: docker
    name: speto-backend
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: INTEGRATION_WEBHOOK_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 30
      - key: ENABLE_DEMO_SEED
        value: false
      - key: ENABLE_DEV_CLIENT_STATE
        value: false
      - key: OTP_TEST_MODE
        value: false
      - key: RESEND_API_BASE_URL
        value: https://api.resend.com
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: Speto <onboarding@resend.dev>
  - type: web
    runtime: docker
    name: speto-admin-backend
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/admin_backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_JWT_ACCESS_SECRET
        generateValue: true
      - key: ADMIN_CORS_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_REFRESH_TOKEN_TTL_DAYS
        value: 30
